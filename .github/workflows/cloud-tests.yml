# This workflow will build a Java project with Maven
# For more information see: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions

name: RESTEasy Cloud Tests

on:
  pull_request:
    branches:
      - '**'
    paths:
      - '.github/workflows/cloud-tests.yml'
      - 'providers/**'
      - 'resteasy-bom/**'
      - 'resteasy-cdi/**'
      - 'resteasy-client/**'
      - 'resteasy-client-api/**'
      - 'resteasy-client-utils/**'
      - 'resteasy-core/**'
      - 'resteasy-core-spi/**'
      - 'resteasy-dependencies-bom/**'
      - 'resteasy-security/**'
      - 'testsuite/cloud-tests/**'
      - 'wildfly/**'
  schedule:
    - cron: '0 0 * * *' # Every day at 00:00 UTC

# Only run the latest job
concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:

  cloud-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        java: ['17']

    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'
      - name: Setup minikube
        id: minikube
        uses: manusa/actions-setup-minikube@v2.18.0
        with:
          driver: docker
          container runtime: containerd
          minikube version: 'v1.31.2'
          # Downgrade K8s since 1.25 has some problems with https
          kubernetes version: 'v1.28.1'
          github token: ${{ secrets.GITHUB_TOKEN }}
          start args: "--memory='4gb' --cpus='2' --insecure-registry=10.0.0.0/8"

      - name: Setup Local Docker Registry
        run: |
          # Remove any existing registry container to ensure a clean state
          docker rm -f local-registry || true
          
          # Start a new registry container with storage deletion enabled
          docker run -d -p 5000:5000 --restart=always --name local-registry \
            -e REGISTRY_STORAGE_DELETE_ENABLED=true \
            registry:2
          
          # Connect the registry to minikube's network
          docker network disconnect bridge local-registry || true
          docker network connect minikube local-registry || true
          
          # Get the registry's IP on the minikube network
          REGISTRY_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' local-registry | head -n1)
          echo "Registry IP: $REGISTRY_IP"
          
          # Configure containerd inside minikube to use the registry
          minikube ssh "sudo mkdir -p /etc/containerd/certs.d/localhost:5000"
          minikube ssh "echo 'server = \"http://${REGISTRY_IP}:5000\"' | sudo tee /etc/containerd/certs.d/localhost:5000/hosts.toml"
          minikube ssh "sudo systemctl restart containerd"
          
          # Verify the registry is accessible from minikube
          echo "Verifying registry accessibility from minikube..."
          if minikube ssh "curl -f http://${REGISTRY_IP}:5000/v2/_catalog"; then
            echo "Registry is accessible from minikube"
          else
            echo "ERROR: Registry is not accessible from minikube"
            exit 1
          fi
          
          # Verify the registry catalog is empty (fresh start)
          echo "Verifying registry is empty..."
          CATALOG=$(curl -s http://localhost:5000/v2/_catalog)
          echo "Registry catalog: $CATALOG"
      - name: Cloud Tests - JDK ${{ matrix.java }}
        run:  |
          mvn clean install -Pcloud-tests -pl wildfly/resteasy-channel,testsuite/cloud-tests -amd -am '-Ddebug.logs'
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: surefire-reports-${{ matrix.os }}-${{ matrix.java }}
          path: |
            '**/surefire-reports/*'
            '**/failsafe-reports/*'
